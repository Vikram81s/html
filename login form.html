<!DOCTYPE html>
<html>
<head>
	<title> login page</title>
	  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	<style>
		*{
			background-color: #696969;

		}
		.login{
			border: 2px solid;
		background-color: #ffffff;
			
			width: 379px;
            height: 270px;
            margin: 200px 0px;
		}
		.login h1{
			color: green;
		background-color: #ffffff;
		
		}
		.a{
			width: 230px;
            height: 22px;
		background-color: #ffffff;
           
		}
.b{
			width: 155px;
    height: 30px;
    color: #ffffff;
    background:green;
    color: white;
    margin: 10px 110px;
		background-color: #ffffff;
    
		}

		.c{
			color: #000000;background-color: green;

			width: 145px;
    margin: 0px 117px;
    height: 25px;
		}
	</style>

</head>
<body>
<center>
	<div class="login">

		<h1 style="text-align: center;">Login form</h1>
		<hr>
		<form style="background-color: #ffffff;margin-top: 25px;">
			Username <i class="fa fa-user" aria-hidden="true" style=" background-color: #ffffff;"></i>:
			<input type="text" name="" class="a" placeholder="Username ">
			<br><br>
			Password <i class="fa fa-lock" aria-hidden="true" style=" background-color: #ffffff;"></i>:
			<input type="password" name="" class="a"  placeholder=" Enter password">
<br><br>
			<input type="submit" name="" class="c" value="Login" class="b">
			
			<a href="#" style="text-decoration: none; margin: 5px; background-color: #ffffff;">Forgot Password?</a>
		</form>
	</div><!--login end--->	
</center>	
</body>
</html>
